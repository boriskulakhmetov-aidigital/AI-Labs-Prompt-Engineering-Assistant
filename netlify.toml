[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/embed"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/help"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/r/*"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/api/v1/submit"
  to = "/.netlify/functions/api-submit"
  status = 200

[[redirects]]
  from = "/api/v1/status/:job_id"
  to = "/.netlify/functions/api-status?job_id=:job_id"
  status = 200

[[redirects]]
  from = "/api/v1/result/:job_id"
  to = "/.netlify/functions/api-result?job_id=:job_id"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "X-API-Key, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/r/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://*.apps.aidigitallabs.com https://*.netlify.app"

[[headers]]
  for = "/embed"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
